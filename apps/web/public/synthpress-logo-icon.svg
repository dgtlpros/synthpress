<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SynthPress Icon Logo</title>
  <desc id="desc">A rounded robot head app icon with a blue purple gradient body, dark visor, glowing eyes, smile, and antenna.</desc>
  <defs>
    <linearGradient id="bodyGradient" x1="96" y1="416" x2="416" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4C19DB"/>
      <stop offset="0.48" stop-color="#2467FF"/>
      <stop offset="1" stop-color="#16D8EF"/>
    </linearGradient>
    <linearGradient id="bodyHighlight" x1="160" y1="96" x2="352" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#53F3FF" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#2A7DFF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#2B0BAF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="visorGradient" cx="250" cy="235" r="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171C5F"/>
      <stop offset="0.55" stop-color="#090E3B"/>
      <stop offset="1" stop-color="#03051E"/>
    </radialGradient>
    <linearGradient id="antennaGradient" x1="256" y1="122" x2="256" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1842DE"/>
      <stop offset="1" stop-color="#ED42F4"/>
    </linearGradient>
    <radialGradient id="orbGradient" cx="246" cy="48" r="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7BFF"/>
      <stop offset="0.5" stop-color="#D72DFF"/>
      <stop offset="1" stop-color="#414BFF"/>
    </radialGradient>
    <radialGradient id="leftEye" cx="184" cy="245" r="31" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8FFFF"/>
      <stop offset="0.45" stop-color="#58DDFF"/>
      <stop offset="1" stop-color="#1078FF"/>
    </radialGradient>
    <radialGradient id="rightEye" cx="328" cy="245" r="31" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD6FF"/>
      <stop offset="0.45" stop-color="#C755FF"/>
      <stop offset="1" stop-color="#6721FF"/>
    </radialGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1B1464" flood-opacity="0.25"/>
    </filter>
    <filter id="glowBlue" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="82" y="126" width="348" height="300" rx="88" fill="url(#bodyGradient)"/>
    <rect x="82" y="126" width="348" height="300" rx="88" fill="url(#bodyHighlight)"/>
    <rect x="82" y="126" width="348" height="300" rx="88" fill="none" stroke="#62F5FF" stroke-opacity="0.55" stroke-width="4"/>
    <rect x="124" y="204" width="264" height="128" rx="60" fill="url(#visorGradient)"/>
    <path d="M256 126 L256 82" stroke="url(#antennaGradient)" stroke-width="20" stroke-linecap="round"/>
    <circle cx="256" cy="58" r="28" fill="url(#orbGradient)" stroke="#F487FF" stroke-width="3"/>
    <circle cx="184" cy="245" r="25" fill="url(#leftEye)" filter="url(#glowBlue)"/>
    <circle cx="328" cy="245" r="25" fill="url(#rightEye)" filter="url(#glowPurple)"/>
    <path d="M220 294 C238 311 274 311 292 294" fill="none" stroke="#62E9FF" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
